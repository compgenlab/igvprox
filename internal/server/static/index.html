<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>igvprox</title>
  <script src="https://cdn.jsdelivr.net/npm/igv/dist/igv.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f2ea;
      --panel: rgba(255, 255, 255, 0.78);
      --ink: #1c1917;
      --muted: #57534e;
      --accent: #9a3412;
      --border: rgba(28, 25, 23, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(217, 119, 6, 0.18), transparent 30%),
        linear-gradient(180deg, #faf7f2 0%, #efe7da 100%);
      min-height: 100vh;
    }

    .shell {
      width: min(1180px, calc(100vw - 32px));
      margin: 24px auto;
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 50px rgba(28, 25, 23, 0.08);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.4rem);
      font-weight: 600;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .hero {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }

    .tracks {
      margin: 18px 0 22px;
      padding: 16px 18px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.66);
    }

    .tracks ul {
      margin: 12px 0 0;
      padding-left: 18px;
    }

    .tracks li {
      margin: 6px 0;
      word-break: break-all;
    }

    #igv-root {
      min-height: 720px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #fff;
    }

    .status {
      margin-top: 12px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .error {
      color: #991b1b;
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1>igvprox</h1>
      <p>Remote genomics tracks served from an HPC cluster over an SSH-forwarded local port.</p>
    </section>

    <section class="tracks">
      <strong>Discovered tracks</strong>
      <ul id="track-list"></ul>
      <div id="status" class="status">Loading session metadata...</div>
    </section>

    <section id="igv-root"></section>
  </main>

  <script>
    async function boot() {
      const status = document.getElementById("status");
      const list = document.getElementById("track-list");
      try {
        const response = await fetch("/api/session");
        if (!response.ok) {
          throw new Error("session request failed: " + response.status);
        }
        const session = await response.json();
        list.replaceChildren(...session.tracks.map((track) => {
          const li = document.createElement("li");
          li.textContent = track.path;
          return li;
        }));

        status.textContent = "Launching IGV with " + session.tracks.length + " track(s) on genome " + session.genome + ".";
        const options = {
          genome: session.genome,
          locus: "all",
          tracks: session.tracks
        };
        await igv.createBrowser(document.getElementById("igv-root"), options);
      } catch (error) {
        status.textContent = error.message;
        status.classList.add("error");
      }
    }

    boot();
  </script>
</body>
</html>
